name: Deploy Dumpsterin to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build Expo web
      run: npx expo export --platform web

    - name: Deploy to Hostinger via rsync
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p 65002 195.35.35.27 >> ~/.ssh/known_hosts
        rsync -avz --delete -e "ssh -p 65002 -i ~/.ssh/id_rsa" dist/ u781187371@195.35.35.27:/home/u781187371/domains/dumpsterin.com/public_html/
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
